name: file-drive

services:
  postgres:
    image: postgres
    container_name: file-drive-postgres
    environment:
      POSTGRES_DB: file-drive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - file-drive_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "7000:7000" 
      - "7001:7001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --address ":7000" --console-address ":7001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  file-drive_postgres_data:
  minio_data:
